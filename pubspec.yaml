name: xlsxwriter
description: >-
  Native, fast, low-memory Excel .xlsx writer for Dart. An FFI binding to
  libxlsxwriter with a constant-memory mode for large sheets.
version: 0.6.0
repository: https://github.com/Yusufihsangorgel/xlsxwriter

topics:
  - excel
  - xlsx
  - spreadsheet
  - ffi
  - export

screenshots:
  - description: >-
      Writing 100,000 rows by 10 columns: constant-memory mode holds 191 MiB and
       0.87 s, against excel_community's 614 MiB and 1.47 s.
    path: doc/benchmark.png

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: '>=2.0.2 <3.0.0'
  native_toolchain_c: '>=0.19.2 <0.20.0'

dev_dependencies:
  archive: ^4.0.0
  lints: ^6.0.0
  test: ^1.25.0
  xml: ^6.5.0
