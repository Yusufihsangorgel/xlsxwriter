name: xlsxwriter
description: >-
  Native, fast, low-memory Excel .xlsx writer for Dart. An FFI binding to
  libxlsxwriter with a constant-memory mode for large sheets.
version: 0.4.0
repository: https://github.com/Yusufihsangorgel/xlsxwriter

topics:
  - excel
  - xlsx
  - spreadsheet
  - ffi
  - export

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  archive: ^4.0.0
  lints: ^6.0.0
  test: ^1.25.0
  xml: ^6.5.0
