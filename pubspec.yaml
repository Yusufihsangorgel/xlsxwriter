name: xlsxwriter
description: >-
  Native, fast, low-memory Excel .xlsx writer for Dart. An FFI binding to
  libxlsxwriter with a constant-memory mode for large sheets.
version: 0.4.2
repository: https://github.com/Yusufihsangorgel/xlsxwriter

topics:
  - excel
  - xlsx
  - spreadsheet
  - ffi
  - export

screenshots:
  - description: >-
      Writing 100,000 rows by 10 columns: constant-memory mode holds 289 MiB aga
      inst the pure-Dart incumbent's 2025, and takes 0.8 s against 4.4.
    path: doc/benchmark.png

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  archive: ^4.0.0
  lints: ^6.0.0
  test: ^1.25.0
  xml: ^6.5.0
