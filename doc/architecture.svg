<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" font-family="Menlo, monospace">
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38BDF8"/></marker></defs>
  <rect width="1100" height="420" fill="#0B1220"/>
  <text x="60" y="50" font-size="23" font-weight="bold" fill="#E2E8F0">Constant memory: rows leave for disk as you write them</text>
  <text x="60" y="76" font-size="14" fill="#94A3B8">In constant-memory mode a row is serialized and flushed the moment it is done, so a million rows never sit in RAM.</text>

  <!-- your code writing rows -->
  <text x="70" y="140" font-size="12.5" fill="#64748B">your loop</text>
  <rect x="70" y="150" width="220" height="150" rx="8" fill="#0E1A2E" stroke="#1E3A5F"/>
  <text x="88" y="182" font-size="13" fill="#94A3B8">for (r in rows)</text>
  <text x="98" y="210" font-size="12.5" fill="#E2E8F0">sheet.writeString(r, c, v)</text>
  <text x="88" y="240" font-size="13" fill="#94A3B8">workbook.close()</text>
  <text x="88" y="278" font-size="12" fill="#64748B">rows go in order</text>

  <!-- one row buffer (only the current row is held) -->
  <path d="M296 225 L352 225" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="410" y="140" font-size="12.5" fill="#64748B">only the current row is held</text>
  <rect x="362" y="200" width="150" height="50" rx="7" fill="#111C2E" stroke="#38BDF8"/>
  <text x="437" y="230" font-size="13" fill="#38BDF8" text-anchor="middle">one row buffer</text>

  <!-- flush to disk -->
  <path d="M518 225 L574 225" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="524" y="216" font-size="11" fill="#38BDF8">flush</text>
  <!-- disk cylinder -->
  <g stroke="#38BDF8" stroke-width="2" fill="#0E2438">
    <ellipse cx="660" cy="188" rx="70" ry="18"/>
    <path d="M590 188 L590 262" fill="none"/><path d="M730 188 L730 262" fill="none"/>
    <path d="M590 262 A70 18 0 0 0 730 262" fill="none"/>
    <ellipse cx="660" cy="188" rx="70" ry="18" fill="#0E2438"/>
  </g>
  <text x="660" y="300" font-size="13" fill="#E2E8F0" text-anchor="middle">report.xlsx</text>
  <text x="660" y="320" font-size="12" fill="#94A3B8" text-anchor="middle">a zipped OOXML workbook</text>

  <!-- memory comparison -->
  <text x="800" y="150" font-size="13" fill="#94A3B8">Peak memory, 100k rows:</text>
  <rect x="800" y="166" width="70" height="20" fill="#38BDF8"/><text x="878" y="181" font-size="12" fill="#38BDF8">289 MiB, this</text>
  <rect x="800" y="196" width="230" height="20" fill="#334155"/><text x="800" y="240" font-size="12" fill="#94A3B8">2025 MiB, a pure-Dart in-memory writer</text>
  <text x="800" y="278" font-size="12.5" fill="#64748B">libxlsxwriter and zlib, vendored,</text>
  <text x="800" y="298" font-size="12.5" fill="#64748B">compiled by build hooks, over FFI.</text>
</svg>
