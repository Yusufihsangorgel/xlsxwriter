<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="530" viewBox="0 0 1100 530" font-family="Menlo, monospace">
  <rect width="1100" height="530" fill="#0B1220"/>
  <text x="48" y="52" font-size="24" font-weight="bold" fill="#E2E8F0">Writing 100,000 rows x 10 columns</text>
  <text x="48" y="80" font-size="14" fill="#94A3B8">Measured, one process each, Apple Silicon, Dart 3.11. Lower is better.</text>

  <!-- Peak memory panel. Scale: 1778 MiB -> 620px -->
  <text x="48" y="128" font-size="15" fill="#E2E8F0">Peak memory (MiB)</text>
  <g font-size="13">
    <rect x="250" y="146" width="67" height="26" fill="#38BDF8"/>
    <text x="60" y="164" fill="#94A3B8">xlsxwriter const-mem</text><text x="325" y="164" fill="#38BDF8">191</text>
    <rect x="250" y="180" width="110" height="26" fill="#38BDF8" opacity="0.55"/>
    <text x="60" y="198" fill="#94A3B8">xlsxwriter default</text><text x="368" y="198" fill="#E2E8F0">314</text>
    <rect x="250" y="214" width="214" height="26" fill="#475569"/>
    <text x="60" y="232" fill="#94A3B8">excel_community 2.2.0</text><text x="472" y="232" fill="#E2E8F0">614</text>
    <rect x="250" y="248" width="620" height="26" fill="#334155"/>
    <text x="60" y="266" fill="#94A3B8">excel 4.0.6</text><text x="878" y="266" fill="#E2E8F0">1778</text>
  </g>

  <!-- Wall time panel. Scale: 4.63 s -> 620px -->
  <text x="48" y="316" font-size="15" fill="#E2E8F0">Wall time (seconds)</text>
  <g font-size="13">
    <rect x="250" y="334" width="116" height="26" fill="#38BDF8"/>
    <text x="60" y="352" fill="#94A3B8">xlsxwriter const-mem</text><text x="374" y="352" fill="#38BDF8">0.87</text>
    <rect x="250" y="368" width="173" height="26" fill="#38BDF8" opacity="0.55"/>
    <text x="60" y="386" fill="#94A3B8">xlsxwriter default</text><text x="431" y="386" fill="#E2E8F0">1.29</text>
    <rect x="250" y="402" width="197" height="26" fill="#475569"/>
    <text x="60" y="420" fill="#94A3B8">excel_community 2.2.0</text><text x="455" y="420" fill="#E2E8F0">1.47</text>
    <rect x="250" y="436" width="620" height="26" fill="#334155"/>
    <text x="60" y="454" fill="#94A3B8">excel 4.0.6</text><text x="878" y="454" fill="#E2E8F0">4.63</text>
  </g>

  <text x="48" y="492" font-size="13" fill="#64748B">Against the maintained fork excel_community: 3.2x less memory, 1.7x faster. Against excel, unreleased since 2024: 9x and 5x.</text>
  <text x="48" y="512" font-size="13" fill="#64748B">The two pure-Dart runs wrote no number formats or dates, so they did slightly less work than xlsxwriter did.</text>
</svg>
