<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/></pattern></defs>
  <rect width="1200" height="400" fill="#0B1220"/><rect width="1200" height="400" fill="url(#dots)"/>
  <rect x="66" y="196" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="284" font-family="Menlo, monospace" font-size="60" font-weight="bold" fill="#E2E8F0">xlsxwriter</text>
  <text x="66" y="328" font-family="Menlo, monospace" font-size="23" fill="#94A3B8">Fast, low-memory .xlsx writing for Dart, native via FFI</text>
  <!-- motif: spreadsheet grid, header row accented -->
  <g font-family="Menlo, monospace" font-size="15">
    <rect x="864" y="120" width="264" height="160" rx="8" fill="#0E1A2E" stroke="#1E3A5F"/>
    <rect x="864" y="120" width="264" height="36" rx="8" fill="#111C2E" stroke="#38BDF8"/>
    <line x1="864" y1="156" x2="1128" y2="156" stroke="#38BDF8"/>
    <line x1="952" y1="120" x2="952" y2="280" stroke="#1E3A5F"/>
    <line x1="1040" y1="120" x2="1040" y2="280" stroke="#1E3A5F"/>
    <line x1="864" y1="192" x2="1128" y2="192" stroke="#1E3A5F"/>
    <line x1="864" y1="228" x2="1128" y2="228" stroke="#1E3A5F"/>
    <text x="878" y="144" fill="#38BDF8">Item</text><text x="966" y="144" fill="#38BDF8">Qty</text><text x="1054" y="144" fill="#38BDF8">Sum</text>
    <text x="878" y="180" fill="#94A3B8">A</text><text x="966" y="180" fill="#94A3B8">42</text><text x="1054" y="180" fill="#94A3B8">=B</text>
    <text x="878" y="216" fill="#94A3B8">B</text><text x="966" y="216" fill="#94A3B8">17</text><text x="1054" y="216" fill="#94A3B8">=B</text>
    <text x="878" y="252" fill="#94A3B8">C</text><text x="966" y="252" fill="#94A3B8">99</text><text x="1054" y="252" fill="#94A3B8">=B</text>
  </g>
</svg>
